<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo সিঙ্ক</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        h1 { color: #facc15; }
        button {
            background: #22c55e;
            color: black;
            padding: 18px 40px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            width: 100%;
        }
        button:active { transform: scale(0.95); }
        .box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .small-text { color: #94a3b8; font-size: 14px; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        .yellow { color: #facc15; }
    </style>
</head>
<body>
    <h1>🎯 WinGo ডাটা সিঙ্ক</h1>
    <button onclick="syncData()">📥 ডাটা সিঙ্ক করুন</button>
    
    <div class="box" id="status">
        ⏳ বাটনে ক্লিক করুন
    </div>
    
    <div class="box" id="recordsCount">
        📊 রেকর্ড: লোড হচ্ছে...
    </div>

    <script>
    const API = 'https://nothing-is-good.onrender.com/api';
    
    async function syncData() {
        const status = document.getElementById('status');
        status.innerHTML = '⏳ ডাটা আনা হচ্ছে... দয়া করে অপেক্ষা করুন (১০-১৫ সেকেন্ড)';
        
        try {
            // 1. সিঙ্ক করুন
            const syncRes = await fetch(API + '/sync', { method: 'POST' });
            const syncData = await syncRes.json();
            
            if (syncData.success) {
                status.innerHTML = `✅ ${syncData.added} টি নতুন রেকর্ড যোগ হয়েছে!`;
            } else {
                status.innerHTML = `⚠️ ${syncData.message || 'কোনো ডাটা পাওয়া যায়নি'}`;
            }
        } catch (error) {
            status.innerHTML = '❌ সিঙ্ক করতে সমস্যা হয়েছে!';
        }
        
        // 2. রেকর্ড কাউন্ট দেখান
        loadRecords();
    }
    
    async function loadRecords() {
        try {
            const res = await fetch(API + '/records');
            const data = await res.json();
            document.getElementById('recordsCount').innerHTML = 
                `📊 মোট রেকর্ড: <span class="green">${data.length}</span> টি`;
        } catch (error) {
            document.getElementById('recordsCount').innerHTML = '📊 রেকর্ড লোড করতে সমস্যা';
        }
    }
    
    // পেজ লোড হলে রেকর্ড কাউন্ট দেখান
    loadRecords();
    </script>
</body>
</html>
